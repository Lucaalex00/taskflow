server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Angular client-side routing: any unknown path falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container so the browser only ever talks
    # to one origin (avoids CORS entirely in the Docker Compose demo).
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SignalR needs WebSocket upgrade headers forwarded explicitly.
    location /hubs/ {
        proxy_pass http://api:8080/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location = /health {
        proxy_pass http://api:8080/health;
    }
}
